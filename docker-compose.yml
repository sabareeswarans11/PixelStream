services:
  redpanda:
    image: redpandadata/redpanda:v23.3.21
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"   # host-facing Kafka API — use this from Python code
      - "9644:9644"     # Redpanda admin API
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.3
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    volumes:
      - ./monitoring/redpanda-console.yml:/tmp/config.yml:ro
    ports:
      - "8080:8080"     # Web UI — inspect topics and messages
    depends_on:
      redpanda:
        condition: service_healthy
